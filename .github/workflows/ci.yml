name: DevSecOps CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  IMAGE_REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: platform/app

jobs:
  # Job 1: Checkout and pre-commit hooks
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

  # Job 2: Unit tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # Job 3: Integration tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run integration tests
        run: |
          docker-compose -f docker-compose.test.yml up --abort-on-container-exit

  # Job 4: SAST - Semgrep
  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
          severity: ERROR
          generate-sarif: true

      - name: Upload Semgrep results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  # Job 5: SCA - Dependency Audit
  sca-audit:
    name: SCA - Dependency Audit
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc --format json > pip-audit-report.json || true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  # Job 6: Terraform Plan
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: pre-commit
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Terraform Init
        run: |
          cd terraform/environments/dev
          terraform init

      - name: Terraform Plan
        run: |
          cd terraform/environments/dev
          terraform plan -out=tfplan

      - name: Save Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/environments/dev/tfplan

      - name: Post Terraform Plan to PR
        uses: robburger/terraform-pr-commenter@v2
        if: github.event_name == 'pull_request'
        with:
          commenter_type: 'suggestion'
          plan_command: terraform show -no-color tfplan
          output_format: 'markdown'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 7: Checkov - IaC Security
  checkov:
    name: IaC Security - Checkov
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          output_format: sarif
          output_file_path: checkov.sarif

      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

  # Job 8: Docker Build
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, sast-semgrep, sca-audit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIALS }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  # Job 9: Trivy Image Scan
  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif

  # Job 10: Log CI Gate Results to BigQuery
  log-ci-results:
    name: Log CI Gate Results
    runs-on: ubuntu-latest
    needs: [pre-commit, unit-tests, sast-semgrep, sca-audit, checkov, trivy-scan]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Log gate execution to BigQuery
        run: |
          gcloud config set project ${{ env.GCP_PROJECT_ID }}
          
          # Log pre-commit gate
          bq query --use_legacy_sql=false \
            "INSERT INTO \`research.experiment4_ci_gate_effectiveness.gate_executions\`
            VALUES (
              '${{ github.run_id }}',
              '${{ github.sha }}',
              'pre_commit',
              ${{ needs.pre-commit.outputs.duration }},
              '${{ needs.pre-commit.result }}',
              0, 0, 0, 0, 0, 0, false, false
            )"
          
          # Log unit tests gate
          bq query --use_legacy_sql=false \
            "INSERT INTO \`research.experiment4_ci_gate_effectiveness.gate_executions\`
            VALUES (
              '${{ github.run_id }}',
              '${{ github.sha }}',
              'unit_tests',
              ${{ needs.unit-tests.outputs.duration }},
              '${{ needs.unit-tests.result }}',
              0, 0, 0, 0, 0, 0, false, false
            )"
          
          # Log semgrep gate
          bq query --use_legacy_sql=false \
            "INSERT INTO \`research.experiment4_ci_gate_effectiveness.gate_executions\`
            VALUES (
              '${{ github.run_id }}',
              '${{ github.sha }}',
              'semgrep',
              ${{ needs.sast-semgrep.outputs.duration }},
              '${{ needs.sast-semgrep.result }}',
              0, 0, 0, 0, 0, 0, false, false
            )"
          
          # Log trivy gate
          bq query --use_legacy_sql=false \
            "INSERT INTO \`research.experiment4_ci_gate_effectiveness.gate_executions\`
            VALUES (
              '${{ github.run_id }}',
              '${{ github.sha }}',
              'trivy_image',
              ${{ needs.trivy-scan.outputs.duration }},
              '${{ needs.trivy-scan.result }}',
              0, 0, 0, 0, 0, 0, false, false
            )"

  # Job 11: Cosign Sign (only on merge to main)
  cosign-sign:
    name: Cosign Sign Image
    runs-on: ubuntu-latest
    needs: [trivy-scan, terraform-plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-version: v2.2.0

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIALS }}

      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign \
            ${{ env.IMAGE_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --yes

  # Job 12: Push to Artifact Registry (only on merge to main)
  push-image:
    name: Push to Artifact Registry
    runs-on: ubuntu-latest
    needs: [cosign-sign]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIALS }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 13: Update Helm chart values (only on merge to main)
  update-helm-values:
    name: Update Helm Chart Values
    runs-on: ubuntu-latest
    needs: push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in Helm values
        run: |
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|g" k8s/tenants/tenant-a/values.yaml
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|g" k8s/tenants/tenant-b/values.yaml

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -am "chore: update image tag to ${{ github.sha }}" || exit 0
          git push

# Chaos Mesh Time Skew Experiment
# For Experiment 3: SLO Calibration

apiVersion: chaos-mesh.org/v1alpha1
kind: TimeChaos
metadata:
  name: time-skew-experiment
  namespace: tenant-a
spec:
  mode: one
  selector:
    namespaces:
      - tenant-a
    labelSelectors:
      app: api
  timeOffset: "-30s"
  clockIds:
    - CLOCK_REALTIME
  duration: "5m"
  scheduler:
    cron: "@every 5h"
